services:
  app:
    build: .
    container_name: sarabbb-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - app_vendor:/var/www/vendor
      - app_bootstrap_cache:/var/www/bootstrap/cache
    networks:
      - sarabbb-net

  nginx:
    image: nginx:1.25-alpine
    container_name: sarabbb-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www
    depends_on:
      - app
    networks:
      - sarabbb-net

  frontend:
    image: node:20-alpine
    container_name: sarabbb-frontend
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm ci && npm run dev"
    networks:
      - sarabbb-net

networks:
  sarabbb-net:
    driver: bridge

volumes:
  frontend_node_modules:
  app_vendor:
  app_bootstrap_cache:
