version: '3.8'

services:
  app:
    build: .
    container_name: sarabbb-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - sarabbb-net

  nginx:
    image: nginx:1.25-alpine
    container_name: sarabbb-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www
    depends_on:
      - app
    networks:
      - sarabbb-net

networks:
  sarabbb-net:
    driver: bridge
