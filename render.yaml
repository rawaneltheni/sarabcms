services:
  - type: web
    name: sarabbb-app
    runtime: php
    plan: free
    region: oregon
    rootDir: .
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan config:clear
      php artisan route:clear
      php artisan view:clear
      npm ci
      npm run build
    startCommand: |
      php artisan migrate --force
      php artisan serve --host=0.0.0.0 --port=$PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: SARAB
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: sarabbb-app
          property: url
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: sarabbb-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sarabbb-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: sarabbb-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: sarabbb-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sarabbb-db
          property: password


databases:
  - name: sarabbb-db
    plan: free
